<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>達邁 T6 VOCs 回收系統工程進度報告</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; border: 2px solid #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('core-gantt');

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            const procurementData = [
                { id: 1, item: "白鐵透浦皮帶式風機", vendor: "質昌企業", date: "2026-06-15", status: "已訂購", type: "設備" },
                { id: 2, item: "離心式泵浦 (SKH25-14H)", vendor: "三錦機器", date: "2026-07-31", status: "已訂購", type: "設備" },
                { id: 3, item: "金屬無軸封泵 (MP421)", vendor: "匯竑工程", date: "2026-07-31", status: "已訂購", type: "設備" },
                { id: 4, item: "臥式端吸同軸泵 (20HP)", vendor: "永大抽水機", date: "2026-07-31", status: "規劃中", type: "設備" },
                { id: 12, item: "纖維床除霧器 (24支)", vendor: "首克英 (SOCEMO)", date: "2026-08-15", status: "已訂購", type: "核心" },
                { id: 5, item: "廢氣洗滌設備及吊運安裝", vendor: "高科實業", date: "2026-08-17", status: "已訂購", type: "核心" },
                { id: 10, item: "塔槽內件/噴嘴/格柵板", vendor: "鴻鈞機電", date: "2026-08-31", status: "已訂購", type: "材料" },
                { id: 6, item: "洗滌塔填料", vendor: "優尼肯", date: "2026-08-31", status: "已訂購", type: "材料" },
                { id: 7, item: "Water Cooler (VHE-620)", vendor: "聚熱企業", date: "2026-08-31", status: "已訂購", type: "設備" },
                { id: 8, item: "風箱/風管製作與安裝", vendor: "鴻碩鋼業", date: "2026-08-17", status: "已發包", type: "工程" },
                { id: 11, item: "附屬管路與系統安裝工程", vendor: "墩祐工業", date: "2026-09-15", status: "已發包", type: "工程" },
                { id: 9, item: "控制盤/電纜線材", vendor: "東溢興業", date: "2026-05-30", status: "已訂購", type: "材料" },
            ];

            // 總時程
            const scheduleStages = [
                { name: "專案啟動與設計確認", start: "2026-01-12", end: "2026-04-30", color: "bg-blue-500", icon: "info" },
                { name: "設備發包與工廠製作", start: "2026-02-01", end: "2026-08-15", color: "bg-indigo-500", icon: "package" },
                { name: "基礎座與管道預埋工程", start: "2026-05-15", end: "2026-07-15", color: "bg-amber-500", icon: "layers" },
                { name: "現場工程監工與安全管理", start: "2026-05-15", end: "2026-12-10", color: "bg-orange-500", icon: "hard-hat" },
                { name: "關鍵設備進場吊裝", start: "2026-07-16", end: "2026-09-30", color: "bg-red-600", icon: "truck" },
                { name: "風管安裝與系統配管", start: "2026-09-16", end: "2026-11-15", color: "bg-emerald-500", icon: "arrow-right" },
                { name: "電氣控系統接線與測試", start: "2026-10-20", end: "2026-12-05", color: "bg-purple-500", icon: "clock" },
                { name: "系統試車與驗收資料交付", start: "2026-12-10", end: "2027-02-28", color: "bg-gray-500", icon: "check-circle-2" },
            ];

            // 核心排程微調：大型風管提前至 9/16，與 HINO 平行施作
            const detailedTasks = [
                { id: 1, name: "1. 土木施工 (基礎開挖與室內外基座)", start: "2026-05-15", end: "2026-07-15", color: "bg-amber-600" },
                { id: 2, name: "2. 其他設備安裝定位 (風車/風箱)", start: "2026-07-20", end: "2026-08-15", color: "bg-indigo-500" },
                { id: 3, name: "3. 洗滌塔系統安裝工程", start: "2026-08-01", end: "2026-09-15", color: "bg-red-500" },
                { id: 5, name: "4. 冷凝器/除霧器安裝工程", start: "2026-08-01", end: "2026-09-15", color: "bg-cyan-500" },
                { id: 4, name: "5. 濃縮塔系統安裝工程", start: "2026-09-01", end: "2026-09-15", color: "bg-rose-500" },
                { id: 10, name: "★ HINO熱交換器安裝工程 (業主外包)", start: "2026-09-15", end: "2026-10-15", color: "bg-pink-600" },
                { id: 7, name: "6. 小型管線/公用系統配管工程", start: "2026-09-16", end: "2026-11-15", color: "bg-teal-500" },
                { id: 6, name: "7. 大型風管配管/煙囪架台安裝工程 【提前展開】", start: "2026-09-16", end: "2026-11-15", color: "bg-emerald-500" }, // 提前至除霧器後，11/15結束
                { id: 8, name: "8. 儀電及動力系統配線安裝工程", start: "2026-10-20", end: "2026-11-30", color: "bg-purple-600" },
                { id: 9, name: "9. 保溫工程", start: "2026-11-15", end: "2026-12-10", color: "bg-orange-500" },
            ];

            const { timelineData, totalWeeks, projectStartMs, totalDurationMs } = useMemo(() => {
                const start = new Date('2026-01-05T00:00:00'); 
                const end = new Date('2027-03-07T00:00:00'); 
                const data = [];
                let curr = new Date(start);
                let weeksCount = 0;

                while (curr < end) {
                const y = curr.getFullYear();
                const m = curr.getMonth() + 1;
                const d = curr.getDate();

                let monthObj = data.find(item => item.year === y && item.month === m);
                if (!monthObj) {
                    monthObj = { year: y, month: m, weeks: [] };
                    data.push(monthObj);
                }
                monthObj.weeks.push(d);
                weeksCount++;
                curr.setDate(curr.getDate() + 7);
                }
                return {
                timelineData: data,
                totalWeeks: weeksCount,
                projectStartMs: start.getTime(),
                totalDurationMs: weeksCount * 7 * 24 * 60 * 60 * 1000
                };
            }, []);

            const getWeeklyLeftPos = (dateStr) => {
                const date = new Date(dateStr + 'T00:00:00').getTime();
                return ((date - projectStartMs) / totalDurationMs) * 100;
            };

            const getWeeklyWidth = (startStr, endStr) => {
                const start = new Date(startStr + 'T00:00:00').getTime();
                const end = new Date(endStr + 'T00:00:00').getTime() + (24 * 60 * 60 * 1000); 
                return ((end - start) / totalDurationMs) * 100;
            };

            // 核心施工排程甘特圖時間軸運算
            const { coreTimelineData, totalCoreWeeks, coreStartMs, coreTotalDurationMs } = useMemo(() => {
                const start = new Date('2026-04-27T00:00:00'); 
                const end = new Date('2026-12-28T00:00:00'); 
                
                const data = [];
                let curr = new Date(start);
                let weeksCount = 0;

                while (curr < end) {
                const y = curr.getFullYear();
                const m = curr.getMonth() + 1;
                const d = curr.getDate();

                let monthObj = data.find(item => item.year === y && item.month === m);
                if (!monthObj) {
                    monthObj = { year: y, month: m, weeks: [] };
                    data.push(monthObj);
                }
                monthObj.weeks.push(d);
                weeksCount++;
                curr.setDate(curr.getDate() + 7);
                }
                
                return {
                coreTimelineData: data,
                totalCoreWeeks: weeksCount,
                coreStartMs: start.getTime(),
                coreTotalDurationMs: weeksCount * 7 * 24 * 60 * 60 * 1000
                };
            }, []);

            const getCoreLeftPos = (dateStr) => {
                const date = new Date(dateStr + 'T00:00:00').getTime();
                return ((date - coreStartMs) / coreTotalDurationMs) * 100;
            };

            const getCoreWidth = (startStr, endStr) => {
                const start = new Date(startStr + 'T00:00:00').getTime();
                const end = new Date(endStr + 'T00:00:00').getTime() + (24 * 60 * 60 * 1000); 
                return ((end - start) / coreTotalDurationMs) * 100;
            };

            const ImpactCard = ({ title, content, type }) => (
                <div className={`p-4 rounded-lg border-l-4 ${type === 'warning' ? 'bg-yellow-50 border-yellow-400' : 'bg-blue-50 border-blue-400'} mb-4`}>
                <div className="flex items-center mb-2">
                    {type === 'warning' ? <Icon name="alert-triangle" className="text-yellow-600 mr-2" size="20"/> : <Icon name="info" className="text-blue-600 mr-2" size="20"/>}
                    <h4 className="font-bold text-gray-800">{title}</h4>
                </div>
                <p className="text-sm text-gray-600 leading-relaxed">{content}</p>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-900 overflow-x-hidden">
                <header className="bg-slate-800 text-white p-6 shadow-lg">
                    <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                    <div>
                        <h1 className="text-2xl font-bold tracking-tight text-white flex items-center">
                        <Icon name="hard-hat" className="mr-3 text-orange-400" />
                        達邁 T6 VOCs 回收系統工程 - 進度規劃報告
                        </h1>
                        <p className="text-slate-400 mt-1">專案編號: H20026C003 | 更新日期: 2026-04-30 (管線配置提前版)</p>
                    </div>
                    <div className="flex gap-4">
                        <div className="bg-slate-700 p-3 rounded-lg text-center">
                        <div className="text-xs text-slate-400 uppercase tracking-wider font-semibold">專案啟動</div>
                        <div className="font-mono text-sm">2026-01-12</div>
                        </div>
                        <div className="bg-slate-700 p-3 rounded-lg text-center border-l-2 border-orange-500">
                        <div className="text-xs text-slate-400 uppercase tracking-wider font-semibold">預計驗收</div>
                        <div className="font-mono text-sm">2027-02-28</div>
                        </div>
                    </div>
                    </div>
                </header>

                <nav className="bg-white border-b sticky top-0 z-30 shadow-sm overflow-x-auto">
                    <div className="max-w-7xl mx-auto flex w-max md:w-full">
                    {[
                        { id: 'summary', label: '總時程 (週展開)', icon: "calendar" },
                        { id: 'core-gantt', label: '核心施工排程', icon: "list" },
                        { id: 'procurement', label: '採購與物料進場', icon: "package" },
                        { id: 'impact', label: '連鎖影響分析', icon: "alert-triangle" }
                    ].map(tab => (
                        <button
                        key={tab.id}
                        onClick={() => setActiveTab(tab.id)}
                        className={`px-5 py-4 flex items-center gap-2 font-medium transition-all whitespace-nowrap ${
                            activeTab === tab.id ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50/50' : 'text-slate-500 hover:bg-slate-50'
                        }`}
                        >
                        <Icon name={tab.icon} size="18" />
                        {tab.label}
                        </button>
                    ))}
                    </div>
                </nav>

                <main className="max-w-7xl mx-auto p-4 md:p-6">
                    
                    {/* Summary Tab */}
                    {activeTab === 'summary' && (
                    <div className="space-y-6 fade-in">
                        <section className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-2">
                            <h3 className="text-lg font-bold flex items-center text-slate-800">
                            <Icon name="calendar" className="mr-2 text-blue-600" /> 2026-2027 專案甘特圖
                            </h3>
                            <div className="text-xs text-slate-500 bg-slate-100 px-3 py-1.5 rounded-full font-medium">
                            表頭數字代表該週 <span className="font-bold text-slate-700">星期一</span> 的日期
                            </div>
                        </div>
                        
                        <div className="overflow-x-auto pb-4 custom-scrollbar">
                            <div className="min-w-[1300px] bg-white rounded-lg border border-slate-200">
                            {/* Gantt Header */}
                            <div className="flex border-b-2 border-slate-300">
                                <div className="w-64 shrink-0 bg-slate-50 p-3 font-bold text-slate-700 border-r border-slate-200 flex items-end shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)] z-20">
                                工程與階段項目
                                </div>
                                <div className="flex-1 flex relative bg-slate-50">
                                {timelineData.map((m, i) => (
                                    <div key={`${m.year}-${m.month}`} style={{ width: `${(m.weeks.length / totalWeeks) * 100}%` }} className="border-r border-slate-300 pt-2 flex flex-col justify-between">
                                    <div className="text-center font-bold text-slate-700 text-[13px]">
                                        {m.month === 1 ? `${m.year}年 ${m.month}月` : `${m.month}月`}
                                    </div>
                                    <div className="flex text-[11px] text-slate-500 font-bold border-t border-slate-200 mt-1">
                                        {m.weeks.map((weekLabel, wi) => (
                                        <div key={wi} style={{ width: `${(1 / m.weeks.length) * 100}%` }} className={`text-center py-1 ${wi < m.weeks.length - 1 ? 'border-r border-slate-200' : ''}`}>
                                            {weekLabel}
                                        </div>
                                        ))}
                                    </div>
                                    </div>
                                ))}
                                </div>
                            </div>

                            {/* Gantt Body */}
                            <div className="relative">
                                {/* Background Grid Lines */}
                                <div className="absolute inset-0 flex pointer-events-none z-0">
                                <div className="w-64 shrink-0 border-r border-slate-200 bg-white"></div>
                                <div className="flex-1 flex">
                                    {timelineData.flatMap(m => m.weeks).map((_, i) => (
                                    <div key={i} style={{ width: `${(1 / totalWeeks) * 100}%` }} className="border-r border-slate-100 border-dashed"></div>
                                    ))}
                                </div>
                                </div>

                                {/* Gantt Rows */}
                                <div className="relative z-10 py-3 space-y-3">
                                {scheduleStages.map((stage, idx) => (
                                    <div key={idx} className="flex items-center group hover:bg-slate-50/80 transition-colors relative">
                                    <div className="w-64 shrink-0 pl-4 pr-3 py-2 flex items-center gap-3 border-r border-slate-200 bg-white group-hover:bg-slate-50/80 z-20">
                                        <span className={`flex items-center justify-center w-5 h-5 rounded-full text-white ${stage.color} shrink-0`}>
                                        <Icon name={stage.icon} size="12" />
                                        </span>
                                        <span className="text-sm font-bold text-slate-700 truncate" title={stage.name}>
                                        {stage.name}
                                        </span>
                                    </div>
                                    <div className="flex-1 relative h-10">
                                        <div
                                        className={`absolute top-1 bottom-1 rounded shadow-sm opacity-90 group-hover:opacity-100 transition-all flex items-center px-2 cursor-pointer overflow-hidden ${stage.color}`}
                                        style={{
                                            left: `${getWeeklyLeftPos(stage.start)}%`,
                                            width: `${getWeeklyWidth(stage.start, stage.end)}%`,
                                            minWidth: '4px'
                                        }}
                                        >
                                        {getWeeklyWidth(stage.start, stage.end) > 10 && (
                                            <span className="text-[11px] text-white font-mono whitespace-nowrap drop-shadow-sm select-none">
                                            {stage.start.substring(5).replace('-','/')} ~ {stage.end.substring(5).replace('-','/')}
                                            </span>
                                        )}
                                        </div>
                                    </div>
                                    </div>
                                ))}
                                </div>
                            </div>
                            </div>
                        </div>
                        </section>
                    </div>
                    )}

                    {/* Core Gantt Tab */}
                    {activeTab === 'core-gantt' && (
                    <div className="space-y-6 fade-in">
                        <div className="bg-gradient-to-r from-slate-800 to-slate-700 p-6 rounded-xl shadow-md text-white flex flex-col md:flex-row justify-between items-center gap-4">
                        <div>
                            <h3 className="text-xl font-bold flex items-center gap-2 mb-1">
                            <Icon name="sliders" className="text-orange-400" /> 現場核心施工期 - 排程調度一覽
                            </h3>
                            <p className="text-slate-300 text-sm">大型風管提早至除霧器安裝完成後(9/16)與 HINO 展開平行施作，確保 11 月中整體管線完工。</p>
                        </div>
                        <div className="bg-slate-900/50 px-4 py-2 rounded-lg text-sm border border-slate-600 flex items-center gap-2">
                            <Icon name="arrow-right" size="16" className="text-orange-400 animate-pulse" />
                            <span>支援左右滑動拖曳</span>
                        </div>
                        </div>

                        <section className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="flex justify-end p-2 bg-slate-50 border-b border-slate-200">
                            <div className="text-xs text-slate-500 bg-white px-3 py-1.5 rounded-full border border-slate-200 font-medium">
                            表頭數字代表該週 <span className="font-bold text-slate-700">星期一</span> 的日期
                            </div>
                        </div>
                        <div className="overflow-x-auto pb-4 custom-scrollbar">
                            <div className="min-w-[1400px] bg-white">
                            
                            {/* Gantt Header */}
                            <div className="flex border-b-2 border-slate-300 relative bg-white">
                                {/* Sticky Column */}
                                <div className="w-[360px] shrink-0 sticky left-0 bg-slate-100 border-r border-slate-300 z-20 p-4 font-bold text-slate-800 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] flex items-end">
                                施工展開項目 (含業主外包)
                                </div>
                                {/* Timeline Headers */}
                                <div className="flex-1 flex relative bg-slate-50">
                                {coreTimelineData.map((m, i) => (
                                    <div key={`${m.year}-${m.month}`} style={{ width: `${(m.weeks.length / totalCoreWeeks) * 100}%` }} className="border-r border-slate-300 pt-2 flex flex-col justify-between">
                                    <div className="text-center font-bold text-slate-700 text-[13px]">
                                        {m.month}月
                                    </div>
                                    <div className="flex text-[11px] text-slate-500 font-bold border-t border-slate-200 mt-1">
                                        {m.weeks.map((weekLabel, wi) => (
                                        <div key={wi} style={{ width: `${(1 / m.weeks.length) * 100}%` }} className={`text-center py-1 ${wi < m.weeks.length - 1 ? 'border-r border-slate-200' : ''}`}>
                                            {weekLabel}
                                        </div>
                                        ))}
                                    </div>
                                    </div>
                                ))}
                                </div>
                            </div>

                            {/* Body Rows */}
                            <div className="relative">
                                {/* Background Grid */}
                                <div className="absolute inset-0 flex pointer-events-none z-0">
                                    <div className="w-[360px] shrink-0 border-r border-slate-200 bg-white"></div>
                                    <div className="flex-1 flex">
                                    {coreTimelineData.flatMap(m => m.weeks).map((_, i) => (
                                        <div key={i} style={{ width: `${(1 / totalCoreWeeks) * 100}%` }} className="border-r border-slate-100 border-dashed"></div>
                                    ))}
                                    </div>
                                </div>

                                {/* Task Data Rows */}
                                <div className="relative z-10">
                                {detailedTasks.map((task) => (
                                    <div key={task.id} className="flex border-b border-slate-100 group hover:bg-blue-50/30 transition-colors relative">
                                    {/* Sticky Task Name */}
                                    <div className={`w-[360px] shrink-0 sticky left-0 group-hover:bg-blue-50/30 z-20 border-r border-slate-200 p-3 flex items-center shadow-[2px_0_5px_-2px_rgba(0,0,0,0.03)] ${task.id === 10 ? 'bg-pink-50' : 'bg-white'}`}>
                                        <span className={`text-sm font-bold ${task.id === 10 ? 'text-pink-700' : 'text-slate-700'}`}>{task.name}</span>
                                    </div>
                                    
                                    {/* Task Timeline area */}
                                    <div className="flex-1 relative h-14">
                                        <div
                                            className={`absolute top-2 bottom-2 rounded-md shadow-sm flex items-center px-3 overflow-hidden cursor-pointer hover:brightness-110 transition-all ${task.color}`}
                                            style={{
                                            left: `${getCoreLeftPos(task.start)}%`,
                                            width: `${getCoreWidth(task.start, task.end)}%`,
                                            minWidth: '4px'
                                            }}
                                            title={`${task.name}\n${task.start} ~ ${task.end}`}
                                        >
                                            {getCoreWidth(task.start, task.end) > 7 && (
                                            <span className="text-[11px] text-white whitespace-nowrap font-medium select-none drop-shadow-sm">
                                            {task.start.slice(5).replace('-','/')} ~ {task.end.slice(5).replace('-','/')}
                                            </span>
                                            )}
                                        </div>
                                    </div>
                                    </div>
                                ))}
                                </div>
                            </div>
                            </div>
                        </div>
                        </section>
                        
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div className="bg-pink-50 p-4 rounded-lg border border-pink-200 col-span-1 md:col-span-3">
                            <h4 className="font-bold text-pink-800 text-sm mb-2 flex items-center gap-2">
